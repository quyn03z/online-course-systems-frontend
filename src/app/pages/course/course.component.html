<main class="main">
    <!-- Courses Section -->
    <section id="courses" class="courses section">

        <div class="container">

            <!-- Loading State -->
            <div *ngIf="isLoading" class="text-center py-5">
                <div class="spinner-border text-success" role="status">
                    <span class="visually-hidden">Đang tải...</span>
                </div>
                <p class="mt-2">Đang tải danh sách khóa học...</p>
            </div>

            <!-- Error State -->
            <div *ngIf="errorMessage && !isLoading" class="alert alert-danger text-center" role="alert">
                {{ errorMessage }}
            </div>

            <!-- Empty State -->
            <div *ngIf="!isLoading && !errorMessage && courses.length === 0" class="text-center py-5">
                <p class="text-muted">Không có khóa học nào.</p>
            </div>

            <!-- Course List -->
            <div class="row" *ngIf="!isLoading && courses.length > 0">

                <div class="col-lg-4 col-md-6 d-flex align-items-stretch mb-4" *ngFor="let course of courses"
                    data-aos="zoom-in">
                    <div class="course-item">
                        <img [src]="course.image || 'assets/img/course-placeholder.jpg'" class="img-fluid"
                            [alt]="course.courseName">
                        <div class="course-content">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <p class="category">{{ course.courseTypeName }}</p>
                                <p class="price">${{ course.price }}</p>
                            </div>

                            <h3><a href="#">{{ course.courseName }}</a></h3>
                            <p class="description">{{ course.description }}</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </section><!-- /Courses Section -->

</main>
