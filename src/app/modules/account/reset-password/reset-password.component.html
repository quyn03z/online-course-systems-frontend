<div class="reset-password-page py-3 py-md-5">
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="col-12 col-md-11 col-lg-8 col-xl-7 col-xxl-6">
                <div class="bg-white p-4 p-md-5 rounded-4 shadow-lg border-0">
                    <div class="row gy-3 mb-4">
                        <div class="col-12 text-center">
                            <h2 class="fw-bold text-dark mb-3">Reset Password</h2>
                            <p class="fs-6 fw-normal text-secondary m-0 px-md-4">
                                Please enter your new password below to regain access to your account.
                            </p>
                        </div>
                    </div>

                    <form (ngSubmit)="onResetPassword()">
                        <div class="row gy-3">
                            <div class="col-12">
                                <label for="password" class="form-label fw-semibold">New Password <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" class="form-control form-control-lg custom-input"
                                        [(ngModel)]="password" name="password" placeholder="Enter new password"
                                        required>
                                </div>
                            </div>

                            <div class="col-12 mt-3">
                                <label for="confirm-password" class="form-label fw-semibold">Confirm Password <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" class="form-control form-control-lg custom-input"
                                        [(ngModel)]="confirmPassword" name="confirmPassword"
                                        placeholder="Confirm new password" required>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
                                <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
                            </div>

                            <div class="col-12 mt-4">
                                <div class="d-grid">
                                    <button class="btn btn-gradient btn-lg" type="submit">Reset Password</button>
                                </div>
                            </div>
                        </div>
                    </form>

                    <div class="row mt-4">
                        <div class="col-12">
                            <hr class="mb-4 border-secondary-subtle">
                            <div class="d-flex justify-content-center">
                                <a routerLink="/login" routerLinkActive="active"
                                    class="link-back-login text-decoration-none">
                                    <i class="bi bi-arrow-left me-1"></i> Back to Log In
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
