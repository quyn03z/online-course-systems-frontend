<!-- Password Reset 1 - Bootstrap Brain Component -->
<div class="bg-light py-3 py-md-5">
    <div class="container">
        <div class="row justify-content-md-center">
            <div class="col-12 col-md-11 col-lg-8 col-xl-7 col-xxl-6">
                <div class="bg-white p-4 p-md-5 rounded shadow-sm">
                    <div class="row gy-3 mb-5">
                        <div class="col-12">
                            <div class="text-center">
                                <h2>Reset Password</h2>
                            </div>
                        </div>
                        <div class="col-12">
                            <h2 class="fs-6 fw-normal text-center text-secondary m-0 px-md-5">Provide the email address
                                associated with your account to recover your password.</h2>
                        </div>
                    </div>
                    <form (ngSubmit)="onResetPassword()">
                        <div class="row gy-3 gy-md-4 overflow-hidden">
                            <div class="col-12">
                                <label for="password" class="form-label">Password <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" class="form-control" [(ngModel)]="password" name="password"
                                        required>
                                </div>
                            </div>
                            <div class="col-12">
                                <label for="confirm-password" class="form-label">Confirm Password <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <input type="password" class="form-control" [(ngModel)]="confirmPassword"
                                        name="confirmPassword" required>
                                </div>
                            </div>
                            <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
                            <div class="success-message" *ngIf="successMessage">{{ successMessage }}</div>
                            <div class="col-12">
                                <div class="d-grid">
                                    <button class="btn btn-primary btn-lg" type="submit">Reset Password</button>
                                </div>
                            </div>
                        </div>
                    </form>
                    <div class="row">
                        <div class="col-12">
                            <hr class="mt-5 mb-4 border-secondary-subtle">
                            <div class="d-flex gap-4 justify-content-center">
                                <a routerLink="/login" routerLinkActive="active"
                                    class="link-secondary text-decoration-none">Log In</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
