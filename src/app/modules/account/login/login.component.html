<div class="container" [class.right-panel-active]="isSignUp">
    <div class="form-container sign-up-container">
        <form (ngSubmit)="onSignUp()">
            <h1>Create Account</h1>
            <input type="text" [(ngModel)]="signUpUsername" placeholder="Name" name="signUpUsername" />
            <input type="email" [(ngModel)]="signUpEmail" placeholder="Email" name="signUpEmail" />
            <input type="password" [(ngModel)]="signUpPassword" placeholder="Password" name="signUpPassword" />
            <input type="password" [(ngModel)]="signUpConfirmPassword" placeholder="Confirm Password"
                name="signUpConfirmPassword" />
            <div class="error-message" *ngIf="errorMessageSignUp">{{ errorMessageSignUp }}</div>
            <div class="success-message" *ngIf="successMessageSignUp">{{ successMessageSignUp }}</div>
            <button type="submit" [disabled]="isLoading">
                {{ isLoading ? 'Signing Up...' : 'Sign Up' }}
            </button>
        </form>
    </div>
    <div class="form-container sign-in-container">
        <form (ngSubmit)="onSignIn()">
            <h1>Sign in</h1>
            <div class="social-container">
                <a href="#" class="social"><i class="bi bi-facebook"></i></a>
                <a href="#" class="social"><i class="bi bi-google"></i></a>
                <a href="#" class="social"><i class="bi bi-linkedin"></i></a>
            </div>
            <span>or use your account</span>
            <input type="text" placeholder="Username" [(ngModel)]="username" name="username" />
            <input type="password" placeholder="Password" [(ngModel)]="password" name="password" />
            <div class="error-message" *ngIf="errorMessageLogin">{{ errorMessageLogin }}</div>
            <a routerLink="/forgot-password" routerLinkActive="active">Forgot your password?</a>
            <button type="submit" [disabled]="isLoading">
                {{ isLoading ? 'Signing In...' : 'Sign In' }}
            </button>
        </form>
    </div>
    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1>Welcome Back!</h1>
                <p>To keep connected with us please login with your personal info</p>
                <button class="ghost" (click)="isSignUp = false">Sign In</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1>Hello, Friend!</h1>
                <p>Enter your personal details and start journey with us</p>
                <button class="ghost" (click)="isSignUp = true">Sign Up</button>
            </div>
        </div>
    </div>
</div>
