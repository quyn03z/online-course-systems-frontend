<div class="container-fluid px-4">
    <h1 class="mt-4">Dashboard</h1>

    <!-- Stat Cards -->
    <div class="row g-4 mb-4">
        <!-- Tổng khóa học -->
        <div class="col-xl-4 col-md-6">
            <div class="card stat-card card-primary text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-label">Tổng khóa học</div>
                            <div class="stat-value">{{adminDashboardModel().totalCourse}}</div>
                        </div>
                        <div class="icon-shape shadow-sm">
                            <i class="fas fa-book-open"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tổng người dùng -->
        <div class="col-xl-4 col-md-6">
            <div class="card stat-card card-warning text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-label">Tổng người dùng</div>
                            <div class="stat-value">{{adminDashboardModel().totalUser}}</div>
                        </div>
                        <div class="icon-shape shadow-sm">
                            <i class="fas fa-users"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Doanh thu -->
        <div class="col-xl-4 col-md-6">
            <div class="card stat-card card-success text-white">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <div class="stat-label">Doanh thu</div>
                            <div class="stat-value">{{adminDashboardModel().totalCost |
                                currency:'VND':'symbol':'1.0-0'}}</div>
                        </div>
                        <div class="icon-shape shadow-sm">
                            <i class="fas fa-wallet"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts -->
    <div class="row">
        <div class="col-xl-6">
            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-chart-area me-1"></i> Area Chart
                </div>
                <div class="card-body">
                    <canvas #areaChart height="200"></canvas>
                </div>
            </div>
        </div>
        <div class="col-xl-6">
            <div class="card mb-4">
                <div class="card-header">
                    <i class="fas fa-chart-bar me-1"></i> Bar Chart
                </div>
                <div class="card-body">
                    <canvas #barChart height="200"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>
